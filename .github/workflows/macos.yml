# Build and test peeky on macOS. The winit-window + crossplatform
# feature combo is the only set supported on Mac; hyprland is Linux only.
#
# First pass: we want to know whether this compiles at all. The codebase
# currently shells out to ydotool for input injection, which is Linux only
# but invoked at runtime, so compilation should still succeed. Anything
# else that doesn't compile on macOS will surface here.

name: macos-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      # lfs: true pulls the routelet model (embedder.onnx) instead of its
      # LFS pointer; the routing regression suite loads it at test time.
      - uses: actions/checkout@v7
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Type-check peeky (default = winit on macOS)
        run: cargo check -p peeky --all-targets

      - name: Test peeky
        run: cargo test -p peeky

      - name: Build peeky bin
        run: cargo build -p peeky --bin peeky

      - uses: actions/upload-artifact@v7
        with:
          name: peeky-macos
          path: target/debug/peeky
