# Fast feedback: rustfmt + type-check + unit tests on every push to main
# and every PR. Builds the cross-platform feature combo because the
# Hyprland-specific deps (gtk4-layer-shell, etc.) aren't packaged for
# generic Ubuntu runners.
#
# Companion workflows:
#   - linux.yml builds a release binary for Linux winit-window
#   - windows.yml builds release binaries for Windows

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # crossplatform pulls in GTK3 on Linux via global-hotkey,
      # plus xcb/x11/wayland deps for xcap + winit + softbuffer.
      # Mirrors linux.yml's dep list so CI compiles cleanly.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libasound2-dev \
            libgbm-dev \
            libegl-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-render0-dev \
            libxcb-randr0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxss-dev \
            pkg-config

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check (winit-window + crossplatform)
        run: cargo check -p aegis --no-default-features --features winit-window,crossplatform

      # Advisory for now: lints surface in CI logs but don't fail the build.
      # Flip to `-- -D warnings` once the existing lints in painter.rs and
      # friends are cleaned up.
      - name: Clippy
        run: cargo clippy -p aegis --no-default-features --features winit-window,crossplatform --all-targets

      - name: Test
        run: cargo test -p aegis --no-default-features --features winit-window,crossplatform --bin aegis
