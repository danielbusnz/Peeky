# Code coverage for the peeky crate using cargo-llvm-cov.
#
# Mirrors the feature set and system deps from ci.yml's test job so the
# coverage numbers match what CI actually tests. LCOV is uploaded to
# Codecov; once the repo is enabled there, the README badge will render.

name: coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      # lfs: true pulls the routelet model (embedder.onnx) instead of its
      # LFS pointer; the routing regression suite loads it at test time.
      - uses: actions/checkout@v7
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libgbm-dev \
            libegl-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-render0-dev \
            libxcb-randr0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxss-dev \
            pkg-config

      - uses: Swatinem/rust-cache@v2

      - name: Generate LCOV coverage
        run: |
          cargo llvm-cov -p peeky \
            --no-default-features \
            --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          # Don't fail PR builds if Codecov is unreachable.
          fail_ci_if_error: false
