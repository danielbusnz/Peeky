name: windows-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Scope to the aegis crate. The launcher (Tauri) needs an icon.ico
      # we don't have committed yet; until it does, including it here
      # breaks the windows build.
      - name: Type-check aegis (default = winit on Windows)
        run: cargo check -p aegis --all-targets

      - name: Build aegis (main bin)
        run: cargo build -p aegis --bin aegis

      - name: Build cross-platform demo_win
        run: cargo build -p aegis-demos --no-default-features --features crossplatform --bin demo_win

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: aegis-windows
          path: |
            target/debug/aegis.exe
            target/debug/demo_win.exe
