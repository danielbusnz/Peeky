name: linux-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libwayland-dev \
            libasound2-dev \
            libglib2.0-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxss-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Type-check (crossplatform feature)
        run: cargo check --no-default-features --features winit-window,crossplatform

      - name: Build aegis bin (crossplatform feature)
        run: cargo build --no-default-features --features winit-window,crossplatform --bin aegis

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: aegis-linux
          path: target/debug/aegis
