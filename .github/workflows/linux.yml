name: linux-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # crossplatform feature still pulls in GTK3 on Linux via global-hotkey,
        # plus xcb/randr/X11 deps for xcap screenshots. libgtk-3-dev provides
        # gdk-3.0 + glib + gobject; libasound for cpal; libxkbcommon/libwayland
        # for winit.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libasound2-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-render0-dev \
            libxcb-randr0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxss-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Type-check (crossplatform feature)
        run: cargo check --no-default-features --features winit-window,crossplatform

      - name: Build aegis bin (crossplatform feature)
        run: cargo build --no-default-features --features winit-window,crossplatform --bin aegis

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: aegis-linux
          path: target/debug/aegis
