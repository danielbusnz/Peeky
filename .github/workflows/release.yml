# Builds release binaries for Linux and Windows when a `v*.*.*` tag is
# pushed, then drafts a GitHub Release with the artifacts attached.
# Mirrors the system deps and feature flags from linux.yml / windows.yml.
#
# Drafts are intentional: the maintainer reviews the auto-generated notes
# before publishing. To rebuild an existing tag, use workflow_dispatch.

name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build, e.g. v0.1.0'
        required: true

permissions:
  contents: write
  # Required for actions/attest-build-provenance to mint an OIDC token
  # and store a sigstore-signed SLSA provenance attestation.
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libgbm-dev \
            libegl-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-render0-dev \
            libxcb-randr0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxss-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release, winit / portable path)
        run: |
          cargo build --release -p aegis \
            --no-default-features \
            --bin aegis

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/release/aegis dist/aegis-linux-x86_64
          (cd dist && tar -czf aegis-linux-x86_64.tar.gz aegis-linux-x86_64)
          (cd dist && sha256sum aegis-linux-x86_64.tar.gz > aegis-linux-x86_64.tar.gz.sha256)

      # SLSA build provenance: signed attestation linking the artifact to
      # this exact workflow run and commit. Verifiable with
      # `gh attestation verify aegis-linux-x86_64.tar.gz --repo danielbusnz-lgtm/Aegis`.
      - name: Attest Linux artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/aegis-linux-x86_64.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: aegis-linux
          path: |
            dist/aegis-linux-x86_64.tar.gz
            dist/aegis-linux-x86_64.tar.gz.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release, default = winit on Windows)
        run: cargo build --release -p aegis --bin aegis

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/aegis.exe dist/aegis-windows-x86_64.exe
          Compress-Archive -Path dist/aegis-windows-x86_64.exe -DestinationPath dist/aegis-windows-x86_64.zip
          $hash = (Get-FileHash dist/aegis-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  aegis-windows-x86_64.zip" | Out-File -Encoding ascii dist/aegis-windows-x86_64.zip.sha256

      - name: Attest Windows artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/aegis-windows-x86_64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: aegis-windows
          path: |
            dist/aegis-windows-x86_64.zip
            dist/aegis-windows-x86_64.zip.sha256

  build-macos:
    # macos-latest is Apple Silicon (arm64). Intel Macs would need a
    # separate macos-13 job. Skipping for now: most new Macs are arm64,
    # and we can add x86_64 later if anyone asks for it.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build aegis (release, default = winit on macOS)
        run: |
          cargo build --release -p aegis \
            --bin aegis

      # Tauri's build.rs in launcher/src-tauri copies the aegis binary
      # with the right target-triple suffix, then `cargo tauri build`
      # bundles it as a sidecar inside Aegis Settings.app and produces
      # a .dmg installer.
      - name: Build launcher .app + .dmg
        working-directory: launcher
        run: cargo tauri build

      - name: Package artifact
        run: |
          mkdir -p dist
          # Filename includes version + arch and varies as we bump version,
          # so glob rather than hardcode.
          DMG=$(find launcher/src-tauri/target/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "no .dmg produced; bundle output:"
            find launcher/src-tauri/target/release/bundle -type f | head -50
            exit 1
          fi
          cp "$DMG" dist/aegis-macos-aarch64.dmg
          (cd dist && shasum -a 256 aegis-macos-aarch64.dmg > aegis-macos-aarch64.dmg.sha256)

      - name: Attest macOS artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/aegis-macos-aarch64.dmg

      - uses: actions/upload-artifact@v7
        with:
          name: aegis-macos
          path: |
            dist/aegis-macos-aarch64.dmg
            dist/aegis-macos-aarch64.dmg.sha256

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: aegis-linux
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: aegis-windows
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: aegis-macos
          path: dist/

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          draft: true
          generate_release_notes: true
          files: |
            dist/aegis-linux-x86_64.tar.gz
            dist/aegis-linux-x86_64.tar.gz.sha256
            dist/aegis-windows-x86_64.zip
            dist/aegis-windows-x86_64.zip.sha256
            dist/aegis-macos-aarch64.dmg
            dist/aegis-macos-aarch64.dmg.sha256
