# Builds release artifacts for Linux, Windows, and macOS when a `v*.*.*`
# tag is pushed, then drafts a GitHub Release with them attached. Mirrors
# the system deps and feature flags from linux.yml / windows.yml.
#
# macOS signing + notarization is gated on the APPLE_* repo secrets. With
# them unset the .dmg builds unsigned (recipient right-clicks → Open to get
# past Gatekeeper); set them to ship a signed, notarized .dmg that opens
# with no prompt. Required secrets: APPLE_CERTIFICATE (base64 of the
# Developer ID Application .p12), APPLE_CERTIFICATE_PASSWORD, APPLE_ID,
# APPLE_PASSWORD (app-specific password), APPLE_TEAM_ID.
#
# Drafts are intentional: the maintainer reviews the auto-generated notes
# before publishing. To rebuild an existing tag, use workflow_dispatch.

name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build, e.g. v0.1.0'
        required: true

permissions:
  contents: write
  # Required for actions/attest-build-provenance to mint an OIDC token
  # and store a sigstore-signed SLSA provenance attestation.
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      # lfs: true pulls the routelet model (embedder.onnx) instead of its
      # LFS pointer, which the binary needs at runtime or it panics on load.
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libgbm-dev \
            libegl-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-render0-dev \
            libxcb-randr0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxss-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release, winit / portable path)
        run: |
          cargo build --release -p peeky \
            --no-default-features \
            --bin peeky

      - name: Package artifact
        run: |
          mkdir -p dist/peeky-linux-x86_64
          cp target/release/peeky dist/peeky-linux-x86_64/peeky
          # The classifier loads from ./models/routelet relative to the
          # binary's cwd, so ship the three files alongside the executable.
          # Users untar and run from the extracted dir.
          mkdir -p dist/peeky-linux-x86_64/models/routelet
          cp models/routelet/embedder.onnx \
             models/routelet/head.json \
             models/routelet/tokenizer.json \
             dist/peeky-linux-x86_64/models/routelet/
          (cd dist && tar -czf peeky-linux-x86_64.tar.gz peeky-linux-x86_64)
          (cd dist && sha256sum peeky-linux-x86_64.tar.gz > peeky-linux-x86_64.tar.gz.sha256)

      # SLSA build provenance: signed attestation linking the artifact to
      # this exact workflow run and commit. Verifiable with
      # `gh attestation verify peeky-linux-x86_64.tar.gz --repo danielbusnz-lgtm/Peeky`.
      - name: Attest Linux artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/peeky-linux-x86_64.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: peeky-linux
          path: |
            dist/peeky-linux-x86_64.tar.gz
            dist/peeky-linux-x86_64.tar.gz.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release, default = winit on Windows)
        run: cargo build --release -p peeky --bin peeky

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/peeky-windows-x86_64 | Out-Null
          Copy-Item target/release/peeky.exe dist/peeky-windows-x86_64/peeky.exe
          # Ship the classifier next to the binary so PEEKY_ROUTELET_DIR's
          # default (./models/routelet) resolves on first run.
          New-Item -ItemType Directory -Force dist/peeky-windows-x86_64/models/routelet | Out-Null
          Copy-Item models/routelet/embedder.onnx,models/routelet/head.json,models/routelet/tokenizer.json dist/peeky-windows-x86_64/models/routelet/
          Compress-Archive -Path dist/peeky-windows-x86_64/* -DestinationPath dist/peeky-windows-x86_64.zip
          $hash = (Get-FileHash dist/peeky-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  peeky-windows-x86_64.zip" | Out-File -Encoding ascii dist/peeky-windows-x86_64.zip.sha256

      - name: Attest Windows artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/peeky-windows-x86_64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: peeky-windows
          path: |
            dist/peeky-windows-x86_64.zip
            dist/peeky-windows-x86_64.zip.sha256

  build-macos:
    # macos-latest is Apple Silicon (arm64). Intel Macs would need a
    # separate macos-13 job. Skipping for now: most new Macs are arm64,
    # and we can add x86_64 later if anyone asks for it.
    runs-on: macos-latest
    # Backstop so a wedged step can't burn the full 6h GitHub job cap.
    # Notarization itself is bounded separately (notarytool --timeout below).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build peeky (release, default = winit on macOS)
        run: |
          cargo build --release -p peeky \
            --bin peeky

      # Code signing is fully optional: with no APPLE_CERTIFICATE secret the
      # next steps are skipped and the .dmg builds unsigned, same as before.
      - name: Detect Apple signing secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "DO_SIGN=true" >> "$GITHUB_ENV"
          else
            echo "DO_SIGN=false" >> "$GITHUB_ENV"
            # No Developer ID cert: ad-hoc sign (identity "-") so the app
            # isn't rejected as "damaged" on Apple Silicon. It's still
            # unsigned as far as Gatekeeper is concerned (recipient does
            # right-click -> Open once), but it launches and runs.
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            echo "No APPLE_CERTIFICATE secret set; ad-hoc signing."
          fi

      # Import the Developer ID cert into a throwaway keychain and expose the
      # signing identity to the build step. Keychain password is generated
      # here, not a secret. Mirrors Tauri's documented CI signing recipe.
      - name: Import Developer ID certificate
        if: env.DO_SIGN == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain >/dev/null
          rm -f certificate.p12
          # Distribution outside the App Store needs the "Developer ID
          # Application" identity (not "Apple Development"), so it notarizes.
          CERT_ID=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$CERT_ID" ]; then
            echo "::error::No 'Developer ID Application' identity in the imported certificate."
            exit 1
          fi
          # Export ONLY the signing identity for the build step. We deliberately
          # do NOT export APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID here: their
          # presence is what makes `cargo tauri build` notarize inline (a
          # notarytool submit --wait with no timeout, which is what wedged the
          # job for ~6h). With them absent Tauri signs but skips notarization,
          # and we notarize the .dmg ourselves below with a bounded wait.
          # Setting APPLE_SIGNING_IDENTITY to an empty string is NOT the same as
          # unset. Tauri would try to sign with "" and fail, so we only define
          # it when actually signing.
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Signing identity: $CERT_ID"

      # Tauri's build.rs in console/src-tauri copies the peeky binary with the
      # right target-triple suffix, then `cargo tauri build` bundles it as a
      # sidecar inside Peeky.app and produces a .dmg. With a real Developer ID
      # identity Tauri signs (hardened runtime); with APPLE_SIGNING_IDENTITY="-"
      # from the detect step it ad-hoc signs. Notarization is intentionally a
      # separate step below, not done here.
      - name: Build console .app + .dmg
        working-directory: console
        run: cargo tauri build

      - name: Locate .dmg
        run: |
          mkdir -p dist
          # Cargo workspace: the bundle lands in the workspace-root target dir
          # (target/release/bundle), not under console/src-tauri. Filename
          # includes version + arch and varies, so glob rather than hardcode.
          DMG=$(find target/release/bundle -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "no .dmg produced; bundle output:"
            find target/release/bundle -type f | head -50
            exit 1
          fi
          cp "$DMG" dist/peeky.dmg

      # Notarize the signed .dmg ourselves instead of letting `cargo tauri
      # build` do it inline. notarytool's default wait is unbounded, which is
      # what hung the job for ~6h. --timeout fails the submit in minutes if
      # Apple's notary queue is stuck, and on any non-Accepted result we pull
      # the notary log so the reason shows up in the run. Stapling writes the
      # ticket into the .dmg so it validates offline (no Gatekeeper network
      # round-trip on first open). Skipped on the unsigned path (DO_SIGN=false).
      - name: Notarize and staple .dmg
        if: env.DO_SIGN == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=dist/peeky.dmg
          # Don't let the default -e abort before we can read the status/log.
          set +e
          OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m \
            --output-format json)
          RC=$?
          set -e
          echo "$OUT"
          ID=$(echo "$OUT" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("id",""))' 2>/dev/null || true)
          STATUS=$(echo "$OUT" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("status",""))' 2>/dev/null || true)
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed (status='$STATUS', notarytool exit=$RC)."
            if [ -n "$ID" ]; then
              echo "----- notary log $ID -----"
              xcrun notarytool log "$ID" \
                --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      # Checksum AFTER stapling: stapling rewrites the .dmg, so hashing earlier
      # would publish a hash that doesn't match the shipped file.
      - name: Checksum artifact
        run: |
          (cd dist && shasum -a 256 peeky.dmg > peeky.dmg.sha256)

      - name: Attest macOS artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/peeky.dmg

      - uses: actions/upload-artifact@v7
        with:
          name: peeky-macos
          path: |
            dist/peeky.dmg
            dist/peeky.dmg.sha256

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: peeky-linux
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: peeky-windows
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: peeky-macos
          path: dist/

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          draft: true
          generate_release_notes: true
          files: |
            dist/peeky-linux-x86_64.tar.gz
            dist/peeky-linux-x86_64.tar.gz.sha256
            dist/peeky-windows-x86_64.zip
            dist/peeky-windows-x86_64.zip.sha256
            dist/peeky.dmg
            dist/peeky.dmg.sha256
