name = "aegis-proxy"
main = "src/index.ts"
compatibility_date = "2026-05-15"

# Default daily caps (per device, UTC day). Override here without redeploying
# code — `wrangler deploy` picks up changes.
#
# Sizing notes:
#   Anthropic: each voice turn sends two screenshots @ ~1.3-1.5k tokens each
#     plus system prompt + transcript ≈ 3.5k input tokens, ~200-300 output
#     tokens. 100k input / 20k output ≈ 30 turns/day.
#   Deepgram: each token gates one streaming STT session. 50 sessions/day is
#     ~50 voice queries (one per turn). At ~10s of audio each, ~$0.04/day cap.
#   Cartesia: each token gates one or more TTS sessions. Allow a few extra
#     because the client may need to refresh during longer conversations.
[vars]
DAILY_INPUT_TOKEN_CAP = "100000"
DAILY_OUTPUT_TOKEN_CAP = "20000"
DAILY_DEEPGRAM_TOKEN_CAP = "50"
DAILY_CARTESIA_TOKEN_CAP = "100"

# KV namespace for per-device usage counters. Create with:
#   wrangler kv namespace create USAGE_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "USAGE_KV"
id = "cdfd0f967d61437d8a4833b18899e343"

# Secrets (set out-of-band, never committed):
#   wrangler secret put ANTHROPIC_API_KEY
