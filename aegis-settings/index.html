<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: #ffffff;
      }

      ::-webkit-scrollbar { display: none; }

      .window {
        box-sizing: border-box;
        height: 100%;
        background: #1a1a1a;
        border: none;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        box-shadow: none;
      }

      .screen {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .screen[hidden] { display: none; }

      #screen-welcome {
        align-items: center;
        justify-content: center;
        position: relative;
      }

      @keyframes breathing {
        0%, 100% { transform: scale(0.9); }
        50%      { transform: scale(1.15); }
      }

      @keyframes breathing-slow {
        0%, 100% { transform: scale(0.97); }
        50%      { transform: scale(1.03); }
      }

      #outer-halo {
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: rgba(255, 140, 0, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: breathing-slow 5s ease-in-out infinite;
      }

      #breathing-button {
        width: 180px;
        height: 180px;
        padding: 0;
        border: 1px solid rgba(255, 140, 0, 0.1);
        animation: breathing 5s ease-in-out infinite;
        background: rgba(255, 140, 0, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @keyframes breathing-cursor {
        0%, 100% { transform: scale(0.95); }
        50%      { transform: scale(1.08); }
      }

      #cursor-button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 96px;
        height: 96px;
        background: transparent;
        border: none;
        padding: 0;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        outline: none;
        transition: transform 150ms ease-out;
      }

      #cursor-button:hover {
        transform: translate(-50%, -50%) scale(1.2);
      }

      #cursor-button img {
        width: 100%;
        height: 100%;
        animation: breathing-cursor 5s ease-in-out infinite;
        pointer-events: none;
        display: block;
      }

      .integrations {
        display: flex;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        margin-top: auto;
      }

      .integration {
        width: 64px;
        height: 64px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 0;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        outline: none;
        display: grid;
        place-items: center;
      }

      .integration img {
        width: 32px;
        height: 32px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="window" data-tauri-drag-region>
      <section id="screen-welcome" class="screen">
        <div id="outer-halo">
          <div id="breathing-button"></div>
        </div>
        <button id="cursor-button" aria-label="Start Aegis">
          <img src="icons/cursor.svg" alt="" />
        </button>
      </section>

      <section id="screen-settings" class="screen" hidden>
        <div class="integrations">
          <button class="integration" data-integration="gmail" aria-label="Connect Gmail">
            <img src="icons/gmail.svg" alt="" />
          </button>
          <button class="integration" data-integration="github" aria-label="Connect GitHub">
            <img src="icons/github.svg" alt="" />
          </button>
          <button class="integration" data-integration="spotify" aria-label="Connect Spotify">
            <img src="icons/spotify.svg" alt="" />
          </button>
          <button class="integration" data-integration="youtube" aria-label="Connect YouTube">
            <img src="icons/youtube.svg" alt="" />
          </button>
        </div>
      </section>
    </div>

    <script>
      const screens = ["welcome", "settings"];
      function show(name) {
        screens.forEach((s) => {
          document.getElementById(`screen-${s}`).hidden = s !== name;
        });
      }
      // Call show("settings") from the console to preview the settings view.

      document.getElementById("cursor-button").addEventListener("click", () => {
        console.log("cursor clicked");
        // TODO: invoke a Tauri command to launch the aegis binary in demo mode.
        show("settings");
      });

      document.querySelectorAll(".integration").forEach((btn) => {
        btn.addEventListener("click", () => {
          console.log("integrate:", btn.dataset.integration);
          // TODO: invoke a Tauri command to start the OAuth flow.
        });
      });
    </script>
  </body>
</html>
