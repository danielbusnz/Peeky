<!doctype html>
<html lang="en" class="h-full bg-[#1a1a1a]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full relative" data-tauri-drag-region>
    <button type="button" id="close-button" aria-label="Close" class="absolute top-3 right-3 z-10 flex h-7 w-7 cursor-pointer items-center justify-center rounded-full text-lg leading-none text-gray-500 transition-colors hover:bg-white/5 hover:text-gray-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#ff8c00]/60">×</button>
    <div class="flex min-h-full flex-col items-center justify-center gap-8 px-6 py-8">
      <p class="text-2xl text-gray-400">
        Hold
        <button type="button" id="dismiss-button" class="cursor-pointer select-none align-middle inline-flex items-center gap-2 rounded-lg transition-transform duration-75 hover:scale-105 active:translate-y-[2px] active:scale-100 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#ff8c00]/60">
          <kbd class="rounded-md bg-[#2a2a2a] px-3 py-1.5 text-base font-mono text-white shadow-[0_6px_18px_rgba(255,140,0,0.18)] border border-white/10">Ctrl</kbd>
          <span class="text-base text-gray-500">+</span>
          <kbd class="rounded-md bg-[#2a2a2a] px-3 py-1.5 text-base font-mono text-white shadow-[0_6px_18px_rgba(255,140,0,0.18)] border border-white/10">Space</kbd>
        </button>
        and ask a question to get started.
      </p>

      <!-- Invite code section. macOS-only for now; onboarding.js wires this
           up only when #invite-section is present. Lets recruiters and beta
           testers paste a code that promotes their requests from the trial
           tier to the demo tier. -->
      <div id="invite-section" class="flex flex-col items-center gap-3 w-full max-w-sm">
        <div class="h-px w-16 bg-white/10"></div>
        <label for="invite-code" class="text-sm text-gray-500">
          Have an invite code?
        </label>
        <div class="flex w-full items-center gap-2">
          <input
            id="invite-code"
            type="text"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
            placeholder="EXAMPLE-CODE-XXXX"
            class="flex-1 rounded-md bg-white/5 px-3 py-1.5 text-sm text-white outline-1 -outline-offset-1 outline-[#ff8c00]/30 placeholder:text-gray-600 focus:outline-2 focus:-outline-offset-2 focus:outline-[#ff8c00] uppercase tracking-wider"
          />
          <button
            type="button"
            id="invite-save"
            class="rounded-md bg-[#ff8c00] px-3 py-1.5 text-sm font-semibold text-white hover:bg-[#ffa500] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#ff8c00] disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Save
          </button>
        </div>
        <p id="invite-status" class="text-xs text-gray-500 min-h-4"></p>
      </div>
    </div>
    <script src="onboarding.js" defer></script>
  </body>
</html>
