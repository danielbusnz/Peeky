<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peeky · Sign in</title>
    <link rel="stylesheet" href="../shared/base.css" />
    <link rel="stylesheet" href="signin.css" />
  </head>
  <body>
    <div class="window" data-tauri-drag-region>
      <div class="card" data-tauri-drag-region>
        <div class="sheen" aria-hidden="true"></div>
        <span class="wordmark"><img src="../shared/cursor.svg" alt="" />Peeky</span>

        <div id="signin-card" class="signin-content">
          <img class="signin-logo" src="../shared/cursor.svg" alt="Peeky" />
          <h1 class="signin-title">Sign in to Peeky</h1>
          <p class="signin-sub">For billing and syncing your settings across devices.</p>

          <button id="github-btn" type="button" class="btn-github">
            <img src="../icons/github.svg" alt="" class="btn-github-icon" />
            <span id="github-label">Continue with GitHub</span>
          </button>

          <p id="status" class="signin-status" role="status"></p>

          <div id="signed-in" class="signed-in hidden">
            <p class="signed-in-text">Signed in as <span id="signed-in-email"></span></p>
            <button id="signout-btn" type="button" class="signout-link">Sign out</button>
          </div>
        </div>
      </div>
    </div>

    <script src="signin.js" defer></script>
  </body>
</html>
