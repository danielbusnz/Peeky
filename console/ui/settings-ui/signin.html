<!doctype html>
<html lang="en" class="h-full bg-[#1a1a1a]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peeky · Sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full" data-tauri-drag-region>
    <div class="flex min-h-full flex-col justify-center px-6 py-8 lg:px-8">
      <div id="signin-card" class="sm:mx-auto sm:w-full sm:max-w-sm">
        <img src="../shared/cursor.svg" alt="Peeky" class="mx-auto h-20 w-auto" />
        <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Sign in to Peeky</h2>
        <p class="mt-2 text-center text-sm/6 text-gray-400">For billing and syncing your settings across devices.</p>

        <div class="mt-10 space-y-4">
          <button
            id="github-btn"
            type="button"
            class="flex w-full items-center justify-center gap-3 rounded-md bg-white/10 px-3 py-2 text-sm/6 font-semibold text-white outline-1 -outline-offset-1 outline-white/20 hover:bg-white/15 focus-visible:outline-2 focus-visible:outline-[#ff8c00] disabled:opacity-50"
          >
            <img src="../icons/github.svg" alt="" class="h-5 w-5" />
            <span id="github-label">Continue with GitHub</span>
          </button>

          <p id="status" class="text-center text-sm/6 text-gray-400" role="status"></p>
        </div>

        <div id="signed-in" class="mt-6 hidden text-center">
          <p class="text-sm/6 text-gray-300">Signed in as <span id="signed-in-email" class="font-semibold text-white"></span></p>
          <button id="signout-btn" type="button" class="mt-2 text-sm font-semibold text-[#ff8c00] hover:text-[#ffa500]">Sign out</button>
        </div>
      </div>
    </div>

    <script src="signin.js" defer></script>
  </body>
</html>
